<script>
/* ===========================================================================
 *  Estado de la aplicacion
 * ======================================================================== */
var state = {
  text: '',
  useHeader: true,
  header: { title: '', subtitle: '', imageUrl: '', imageType: 'CIRCLE' },
  sections: []
};

var WIDGET_LABELS = {
  text: 'Texto',
  image: 'Imagen',
  buttons: 'Botones',
  decoratedText: 'Texto decorado',
  divider: 'Separador'
};

function uid() { return 'w' + Math.random().toString(36).slice(2, 9); }

/* ===========================================================================
 *  Inicializacion
 * ======================================================================== */
document.addEventListener('DOMContentLoaded', function () {
  // Recuperar webhook guardado en el servidor.
  google.script.run.withSuccessHandler(function (url) {
    if (url) {
      document.getElementById('webhookUrl').value = url;
      document.getElementById('webhookHint').textContent = 'Webhook recuperado de tu sesion anterior.';
    }
  }).getSavedWebhook();

  // Empezar con una seccion por defecto.
  addSection();

  bindStaticInputs();
  renderSections();
  refresh();
});

/* ===========================================================================
 *  Enlaces de inputs estaticos (texto, encabezado, webhook)
 * ======================================================================== */
function bindStaticInputs() {
  document.getElementById('plainText').addEventListener('input', function (e) {
    state.text = e.target.value; refresh();
  });

  document.getElementById('useHeader').addEventListener('change', function (e) {
    state.useHeader = e.target.checked;
    document.getElementById('headerFields').style.opacity = e.target.checked ? '1' : '.45';
    document.getElementById('headerFields').style.pointerEvents = e.target.checked ? 'auto' : 'none';
    refresh();
  });

  document.getElementById('hTitle').addEventListener('input', function (e) { state.header.title = e.target.value; refresh(); });
  document.getElementById('hSubtitle').addEventListener('input', function (e) { state.header.subtitle = e.target.value; refresh(); });
  document.getElementById('hImageUrl').addEventListener('input', function (e) { state.header.imageUrl = e.target.value; refresh(); });
  document.getElementById('hImageType').addEventListener('change', function (e) { state.header.imageType = e.target.value; refresh(); });

  // Subir imagen de encabezado
  document.getElementById('hImageUploadBtn').addEventListener('click', function () {
    document.getElementById('hImageFile').click();
  });
  document.getElementById('hImageFile').addEventListener('change', function (e) {
    var file = e.target.files[0];
    if (!file) return;
    handleUpload(file, document.getElementById('hImageStatus'), function (url) {
      state.header.imageUrl = url;
      document.getElementById('hImageUrl').value = url;
      refresh();
    });
  });

  // Webhook
  document.getElementById('saveWebhookBtn').addEventListener('click', function () {
    var url = document.getElementById('webhookUrl').value.trim();
    if (!url) { toast('Escribe una URL de webhook primero.', 'err'); return; }
    google.script.run.withSuccessHandler(function () {
      toast('Webhook guardado.', 'ok');
    }).saveWebhook(url);
  });

  // Botones generales
  document.getElementById('addSectionBtn').addEventListener('click', function () { addSection(); renderSections(); refresh(); });
  document.getElementById('copyJsonBtn').addEventListener('click', copyJson);
  document.getElementById('sendBtn').addEventListener('click', openConfirm);

  // Modal
  document.getElementById('cancelSendBtn').addEventListener('click', closeConfirm);
  document.getElementById('confirmSendBtn').addEventListener('click', doSend);
}

/* ===========================================================================
 *  Manejo de secciones y widgets (modelo)
 * ======================================================================== */
function addSection() {
  state.sections.push({ id: uid(), header: '', widgets: [] });
}
function removeSection(id) {
  state.sections = state.sections.filter(function (s) { return s.id !== id; });
}
function addWidget(sectionId, type) {
  var s = findSection(sectionId);
  if (!s) return;
  var w = { id: uid(), type: type };
  if (type === 'text') w.text = '';
  if (type === 'image') { w.imageUrl = ''; w.altText = ''; w.onClickUrl = ''; }
  if (type === 'buttons') w.buttons = [{ text: '', url: '', color: '' }];
  if (type === 'decoratedText') { w.topLabel = ''; w.text = ''; w.bottomLabel = ''; }
  s.widgets.push(w);
}
function removeWidget(sectionId, widgetId) {
  var s = findSection(sectionId);
  if (!s) return;
  s.widgets = s.widgets.filter(function (w) { return w.id !== widgetId; });
}
function findSection(id) {
  for (var i = 0; i < state.sections.length; i++) if (state.sections[i].id === id) return state.sections[i];
  return null;
}
function findWidget(sectionId, widgetId) {
  var s = findSection(sectionId);
  if (!s) return null;
  for (var i = 0; i < s.widgets.length; i++) if (s.widgets[i].id === widgetId) return s.widgets[i];
  return null;
}

/* ===========================================================================
 *  Render del formulario de secciones
 * ======================================================================== */
function el(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function renderSections() {
  var container = document.getElementById('sections');
  container.innerHTML = '';

  state.sections.forEach(function (section, sIdx) {
    var block = el('div', 'section-block');

    // Encabezado de seccion
    var head = el('div', 'section-head');
    var field = el('label', 'field');
    field.innerHTML = '<span>Título de la sección ' + (sIdx + 1) + ' (opcional)</span>';
    var inp = el('input');
    inp.type = 'text';
    inp.value = section.header;
    inp.placeholder = 'Ej. Detalles';
    inp.addEventListener('input', function (e) { section.header = e.target.value; refresh(); });
    field.appendChild(inp);
    head.appendChild(field);

    var delBtn = el('button', 'icon-btn', '🗑');
    delBtn.title = 'Eliminar sección';
    delBtn.addEventListener('click', function () { removeSection(section.id); renderSections(); refresh(); });
    head.appendChild(delBtn);
    block.appendChild(head);

    // Widgets
    section.widgets.forEach(function (w) {
      block.appendChild(renderWidget(section, w));
    });

    // Agregar widget
    var add = el('div', 'widget-add');
    Object.keys(WIDGET_LABELS).forEach(function (type) {
      var chip = el('button', 'chip', '+ ' + WIDGET_LABELS[type]);
      chip.addEventListener('click', function () { addWidget(section.id, type); renderSections(); refresh(); });
      add.appendChild(chip);
    });
    block.appendChild(add);

    container.appendChild(block);
  });
}

function renderWidget(section, w) {
  var block = el('div', 'widget-block');
  var head = el('div', 'widget-head');
  head.appendChild(el('span', 'widget-type', WIDGET_LABELS[w.type]));
  var del = el('button', 'icon-btn', '✕');
  del.title = 'Quitar widget';
  del.addEventListener('click', function () { removeWidget(section.id, w.id); renderSections(); refresh(); });
  head.appendChild(del);
  block.appendChild(head);

  if (w.type === 'text') {
    var ta = el('textarea'); ta.rows = 3; ta.value = w.text;
    ta.placeholder = 'Texto. Admite HTML: <b>, <i>, <a href="">...';
    ta.addEventListener('input', function (e) { w.text = e.target.value; refresh(); });
    block.appendChild(ta);
  }

  if (w.type === 'image') {
    block.appendChild(labeledInput('URL de la imagen', w.imageUrl, 'https://...', function (v) { w.imageUrl = v; }, 'img-url-' + w.id));
    var upRow = el('div', 'upload-row');
    var upBtn = el('button', 'btn ghost small', '⬆ Subir imagen');
    var fileInp = el('input'); fileInp.type = 'file'; fileInp.accept = 'image/*'; fileInp.style.display = 'none';
    var status = el('span', 'upload-status');
    upBtn.addEventListener('click', function () { fileInp.click(); });
    fileInp.addEventListener('change', function (e) {
      var f = e.target.files[0]; if (!f) return;
      handleUpload(f, status, function (url) {
        w.imageUrl = url;
        var box = document.getElementById('img-url-' + w.id);
        if (box) box.value = url;
        refresh();
      });
    });
    upRow.appendChild(upBtn); upRow.appendChild(fileInp); upRow.appendChild(status);
    block.appendChild(upRow);
    block.appendChild(labeledInput('Texto alternativo (alt)', w.altText, 'Descripción', function (v) { w.altText = v; }));
    block.appendChild(labeledInput('Al hacer clic, abrir enlace (opcional)', w.onClickUrl, 'https://...', function (v) { w.onClickUrl = v; }));
  }

  if (w.type === 'buttons') {
    var list = el('div');
    function renderButtons() {
      list.innerHTML = '';
      w.buttons.forEach(function (b, bi) {
        var row = el('div', 'btn-row-item');
        var t = el('input'); t.type = 'text'; t.placeholder = 'Texto'; t.value = b.text;
        t.addEventListener('input', function (e) { b.text = e.target.value; refresh(); });
        var u = el('input'); u.type = 'text'; u.placeholder = 'https://enlace'; u.value = b.url;
        u.addEventListener('input', function (e) { b.url = e.target.value; refresh(); });
        var c = el('input'); c.type = 'color'; c.className = 'color-input';
        c.value = b.color || '#1a73e8'; c.title = 'Color del botón';
        c.addEventListener('input', function (e) { b.color = e.target.value; refresh(); });
        var rm = el('button', 'icon-btn', '✕');
        rm.addEventListener('click', function () { w.buttons.splice(bi, 1); if (!w.buttons.length) w.buttons.push({text:'',url:'',color:''}); renderButtons(); refresh(); });
        row.appendChild(t); row.appendChild(u); row.appendChild(c); row.appendChild(rm);
        list.appendChild(row);
      });
    }
    renderButtons();
    block.appendChild(list);
    var addBtn = el('button', 'btn ghost small', '+ Agregar botón');
    addBtn.addEventListener('click', function () { w.buttons.push({ text: '', url: '', color: '' }); renderButtons(); refresh(); });
    block.appendChild(addBtn);
  }

  if (w.type === 'decoratedText') {
    block.appendChild(labeledInput('Etiqueta superior', w.topLabel, 'Ej. Precio', function (v) { w.topLabel = v; }));
    block.appendChild(labeledInput('Texto principal', w.text, 'Ej. $499', function (v) { w.text = v; }));
    block.appendChild(labeledInput('Etiqueta inferior', w.bottomLabel, 'Ej. IVA incluido', function (v) { w.bottomLabel = v; }));
  }

  if (w.type === 'divider') {
    block.appendChild(el('p', 'hint', 'Línea separadora horizontal.'));
  }

  return block;
}

function labeledInput(label, value, placeholder, onInput, id) {
  var f = el('label', 'field');
  f.innerHTML = '<span>' + label + '</span>';
  var i = el('input'); i.type = 'text'; i.value = value || ''; i.placeholder = placeholder || '';
  if (id) i.id = id;
  i.addEventListener('input', function (e) { onInput(e.target.value); refresh(); });
  f.appendChild(i);
  return f;
}

/* ===========================================================================
 *  Subida de imagenes (cliente -> servidor)
 * ======================================================================== */
function handleUpload(file, statusEl, onDone) {
  if (file.size > 25 * 1024 * 1024) {
    statusEl.textContent = 'La imagen supera 25 MB.';
    statusEl.className = 'upload-status err';
    return;
  }
  statusEl.textContent = 'Subiendo a Drive...';
  statusEl.className = 'upload-status';
  var reader = new FileReader();
  reader.onload = function () {
    google.script.run
      .withSuccessHandler(function (res) {
        statusEl.textContent = '✓ Guardada en "Mensajes ventel"';
        statusEl.className = 'upload-status ok';
        onDone(res.url);
      })
      .withFailureHandler(function (err) {
        statusEl.textContent = 'Error: ' + err.message;
        statusEl.className = 'upload-status err';
      })
      .uploadImage(reader.result, file.name);
  };
  reader.readAsDataURL(file);
}

/* ===========================================================================
 *  Construccion del payload JSON
 * ======================================================================== */
function hexToColor(hex) {
  if (!hex) return null;
  var m = hex.replace('#', '');
  if (m.length !== 6) return null;
  return {
    red: parseInt(m.substr(0, 2), 16) / 255,
    green: parseInt(m.substr(2, 2), 16) / 255,
    blue: parseInt(m.substr(4, 2), 16) / 255,
    alpha: 1
  };
}

function buildPayload() {
  var payload = {};

  if (state.text && state.text.trim()) payload.text = state.text.trim();

  var card = {};

  // Encabezado
  if (state.useHeader) {
    var h = {};
    if (state.header.title.trim()) h.title = state.header.title.trim();
    if (state.header.subtitle.trim()) h.subtitle = state.header.subtitle.trim();
    if (state.header.imageUrl.trim()) {
      h.imageUrl = state.header.imageUrl.trim();
      h.imageType = state.header.imageType;
    }
    if (Object.keys(h).length) card.header = h;
  }

  // Secciones
  var sections = [];
  state.sections.forEach(function (s) {
    var widgets = [];
    s.widgets.forEach(function (w) {
      var widget = buildWidget(w);
      if (widget) widgets.push(widget);
    });
    if (widgets.length) {
      var sec = { widgets: widgets };
      if (s.header && s.header.trim()) sec.header = s.header.trim();
      sections.push(sec);
    }
  });
  if (sections.length) card.sections = sections;

  // Solo agregar cardsV2 si la tarjeta tiene contenido.
  if (card.header || card.sections) {
    payload.cardsV2 = [{ cardId: 'ventel-card', card: card }];
  }

  return payload;
}

function buildWidget(w) {
  if (w.type === 'text') {
    if (!w.text || !w.text.trim()) return null;
    return { textParagraph: { text: w.text } };
  }
  if (w.type === 'image') {
    if (!w.imageUrl || !w.imageUrl.trim()) return null;
    var img = { imageUrl: w.imageUrl.trim() };
    if (w.altText && w.altText.trim()) img.altText = w.altText.trim();
    if (w.onClickUrl && w.onClickUrl.trim()) img.onClick = { openLink: { url: w.onClickUrl.trim() } };
    return { image: img };
  }
  if (w.type === 'buttons') {
    var buttons = [];
    w.buttons.forEach(function (b) {
      if (!b.text || !b.text.trim() || !b.url || !b.url.trim()) return;
      var btn = { text: b.text.trim(), onClick: { openLink: { url: b.url.trim() } } };
      var col = hexToColor(b.color);
      if (col) btn.color = col;
      buttons.push(btn);
    });
    if (!buttons.length) return null;
    return { buttonList: { buttons: buttons } };
  }
  if (w.type === 'decoratedText') {
    var hasContent = (w.topLabel && w.topLabel.trim()) || (w.text && w.text.trim()) || (w.bottomLabel && w.bottomLabel.trim());
    if (!hasContent) return null;
    var dt = {};
    if (w.text && w.text.trim()) dt.text = w.text.trim(); else dt.text = ' ';
    if (w.topLabel && w.topLabel.trim()) dt.topLabel = w.topLabel.trim();
    if (w.bottomLabel && w.bottomLabel.trim()) dt.bottomLabel = w.bottomLabel.trim();
    dt.wrapText = true;
    return { decoratedText: dt };
  }
  if (w.type === 'divider') {
    return { divider: {} };
  }
  return null;
}

/* ===========================================================================
 *  Refresco: preview + JSON
 * ======================================================================== */
function refresh() {
  var payload = buildPayload();
  renderJson(payload);
  renderPreview();
}

function renderJson(payload) {
  var box = document.getElementById('jsonOutput');
  var status = document.getElementById('jsonStatus');
  try {
    var str = JSON.stringify(payload, null, 2);
    box.textContent = str;
    var empty = !payload.text && !payload.cardsV2;
    if (empty) {
      status.textContent = 'El mensaje está vacío. Agrega texto o contenido a la tarjeta.';
      status.className = 'hint err';
    } else {
      status.textContent = '✓ JSON válido y listo para enviar.';
      status.className = 'hint ok';
    }
  } catch (e) {
    box.textContent = '';
    status.textContent = 'Error generando JSON: ' + e.message;
    status.className = 'hint err';
  }
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Convierte el formato de texto de Chat (*negrita*, _cursiva_, <url|texto>) a HTML simple.
function chatTextToHtml(s) {
  var out = escapeHtml(s);
  out = out.replace(/&lt;(https?:\/\/[^|&]+)\|([^&]+)&gt;/g, '<a href="$1" target="_blank">$2</a>');
  out = out.replace(/&lt;(https?:\/\/[^&]+)&gt;/g, '<a href="$1" target="_blank">$1</a>');
  out = out.replace(/\*([^*]+)\*/g, '<b>$1</b>');
  out = out.replace(/_([^_]+)_/g, '<i>$1</i>');
  return out;
}

function renderPreview() {
  // Texto
  var pt = document.getElementById('previewText');
  pt.innerHTML = state.text ? chatTextToHtml(state.text) : '';

  // Tarjeta
  var pc = document.getElementById('previewCard');
  pc.innerHTML = '';

  var payload = buildPayload();
  if (!payload.cardsV2) {
    if (!payload.text) pc.innerHTML = '<div class="gc-empty">Tu mensaje aparecerá aquí.</div>';
    return;
  }
  var card = payload.cardsV2[0].card;

  // Header
  if (card.header) {
    var hdr = el('div', 'gc-header');
    if (card.header.imageUrl) {
      var im = el('img');
      im.src = card.header.imageUrl;
      im.className = (card.header.imageType === 'SQUARE') ? 'square' : 'circle';
      im.onerror = function () { this.style.display = 'none'; };
      hdr.appendChild(im);
    }
    var meta = el('div');
    if (card.header.title) meta.appendChild(el('div', 'gc-title', escapeHtml(card.header.title)));
    if (card.header.subtitle) meta.appendChild(el('div', 'gc-subtitle', escapeHtml(card.header.subtitle)));
    hdr.appendChild(meta);
    pc.appendChild(hdr);
  }

  // Sections
  (card.sections || []).forEach(function (sec) {
    var sdiv = el('div', 'gc-section');
    if (sec.header) sdiv.appendChild(el('div', 'gc-section-header', escapeHtml(sec.header)));
    sec.widgets.forEach(function (wg) {
      sdiv.appendChild(renderPreviewWidget(wg));
    });
    pc.appendChild(sdiv);
  });
}

function renderPreviewWidget(wg) {
  if (wg.textParagraph) {
    return el('div', 'gc-text', chatTextToHtml(wg.textParagraph.text));
  }
  if (wg.image) {
    var img = el('img', 'gc-img');
    img.src = wg.image.imageUrl;
    img.alt = wg.image.altText || '';
    img.onerror = function () { this.replaceWith(elText('gc-empty', 'No se pudo cargar la imagen')); };
    return img;
  }
  if (wg.buttonList) {
    var wrap = el('div', 'gc-buttons');
    wg.buttonList.buttons.forEach(function (b) {
      var a = el('a', 'gc-btn', escapeHtml(b.text));
      a.href = b.onClick.openLink.url; a.target = '_blank';
      if (b.color) {
        a.style.background = colorToCss(b.color);
        a.style.color = '#fff';
        a.style.borderColor = colorToCss(b.color);
      }
      wrap.appendChild(a);
    });
    return wrap;
  }
  if (wg.decoratedText) {
    var d = el('div', 'gc-deco');
    if (wg.decoratedText.topLabel) d.appendChild(el('div', 'top', escapeHtml(wg.decoratedText.topLabel)));
    if (wg.decoratedText.text) d.appendChild(el('div', 'main', escapeHtml(wg.decoratedText.text)));
    if (wg.decoratedText.bottomLabel) d.appendChild(el('div', 'bottom', escapeHtml(wg.decoratedText.bottomLabel)));
    return d;
  }
  if (wg.divider) {
    return el('div', 'gc-divider');
  }
  return el('div');
}

function elText(cls, text) { var e = el('div', cls); e.textContent = text; return e; }
function colorToCss(c) {
  return 'rgb(' + Math.round(c.red * 255) + ',' + Math.round(c.green * 255) + ',' + Math.round(c.blue * 255) + ')';
}

/* ===========================================================================
 *  Copiar JSON
 * ======================================================================== */
function copyJson() {
  var text = document.getElementById('jsonOutput').textContent;
  navigator.clipboard.writeText(text).then(function () {
    toast('JSON copiado al portapapeles.', 'ok');
  }, function () {
    toast('No se pudo copiar.', 'err');
  });
}

/* ===========================================================================
 *  Envio con doble confirmacion
 * ======================================================================== */
function openConfirm() {
  var url = document.getElementById('webhookUrl').value.trim();
  var payload = buildPayload();

  if (!url) { toast('Configura primero la URL del webhook.', 'err'); return; }
  if (!payload.text && !payload.cardsV2) { toast('El mensaje está vacío.', 'err'); return; }

  // Confirmacion 1: mostrar destino en el modal.
  var masked = url.length > 60 ? url.slice(0, 55) + '…' : url;
  document.getElementById('modalTarget').textContent = masked;
  document.getElementById('confirmModal').hidden = false;
}
function closeConfirm() {
  document.getElementById('confirmModal').hidden = true;
}
function doSend() {
  // Confirmacion 2: confirmacion final del navegador.
  var ok = window.confirm('Última confirmación: ¿enviar el mensaje a Google Chat ahora?');
  if (!ok) return;

  var btn = document.getElementById('confirmSendBtn');
  btn.disabled = true; btn.textContent = 'Enviando...';

  var url = document.getElementById('webhookUrl').value.trim();
  var payload = buildPayload();

  google.script.run
    .withSuccessHandler(function () {
      btn.disabled = false; btn.textContent = 'Sí, enviar ahora';
      closeConfirm();
      toast('✓ Mensaje enviado a Google Chat.', 'ok');
    })
    .withFailureHandler(function (err) {
      btn.disabled = false; btn.textContent = 'Sí, enviar ahora';
      toast('Error al enviar: ' + err.message, 'err');
    })
    .sendToWebhook(url, payload);
}

/* ===========================================================================
 *  Toast
 * ======================================================================== */
var toastTimer;
function toast(msg, kind) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (kind ? ' ' + kind : '');
  t.hidden = false;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { t.hidden = true; }, 4000);
}
</script>
