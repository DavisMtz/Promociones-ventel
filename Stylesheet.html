<style>
  :root {
    --bg: #f1f3f4;
    --panel: #ffffff;
    --ink: #202124;
    --muted: #5f6368;
    --line: #dadce0;
    --brand: #1a73e8;
    --brand-dark: #1557b0;
    --ok: #188038;
    --warn: #d93025;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(60,64,67,.15), 0 1px 2px rgba(60,64,67,.1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Google Sans", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
  }

  /* ---------- Topbar ---------- */
  .topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 14px 24px;
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 42px; height: 42px; border-radius: 10px;
    background: linear-gradient(135deg, var(--brand), #34a853);
    color: #fff; font-weight: 700; font-size: 16px;
    display: grid; place-items: center;
  }
  .topbar h1 { margin: 0; font-size: 18px; }
  .topbar p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }

  /* ---------- Layout ---------- */
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(320px, 1fr);
    gap: 24px;
    max-width: 1280px;
    margin: 24px auto;
    padding: 0 24px;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ---------- Cards ---------- */
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
  }
  .card-title {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .card-title h2 { font-size: 15px; margin: 0; flex: 1; }
  .step {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--brand); color: #fff;
    display: grid; place-items: center; font-size: 13px; font-weight: 600;
  }

  /* ---------- Fields ---------- */
  .field { display: block; margin-bottom: 12px; }
  .field > span { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  input[type=text], textarea, select {
    width: 100%; padding: 9px 11px;
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 14px; font-family: inherit; background: #fff; color: var(--ink);
  }
  input[type=text]:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--brand);
    box-shadow: 0 0 0 2px rgba(26,115,232,.15);
  }
  textarea { resize: vertical; }
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
  .hint { color: var(--muted); font-size: 11px; display: block; margin-top: 4px; }

  .webhook-row { display: flex; gap: 8px; }
  .webhook-row input { flex: 1; }

  /* ---------- Toggle ---------- */
  .toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; }
  .toggle input { width: auto; }

  /* ---------- Buttons ---------- */
  .btn {
    border: 1px solid transparent; border-radius: 8px;
    padding: 9px 16px; font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: .15s;
  }
  .btn.small { padding: 6px 12px; font-size: 12px; }
  .btn.big { padding: 13px 22px; font-size: 15px; width: 100%; }
  .btn.primary { background: var(--brand); color: #fff; }
  .btn.primary:hover { background: var(--brand-dark); }
  .btn.ghost { background: #fff; border-color: var(--line); color: var(--brand); }
  .btn.ghost:hover { background: #f6f9fe; }
  .btn.danger { background: #fff; border-color: var(--line); color: var(--warn); }
  .btn.danger:hover { background: #fce8e6; }
  .btn:disabled { opacity: .55; cursor: not-allowed; }

  .upload-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .upload-status { font-size: 11px; color: var(--muted); }
  .upload-status.ok { color: var(--ok); }
  .upload-status.err { color: var(--warn); }

  /* ---------- Sections builder ---------- */
  .section-block {
    border: 1px solid var(--line); border-radius: 10px;
    padding: 14px; margin-bottom: 14px; background: #fafbfc;
  }
  .section-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .section-head .field { flex: 1; margin: 0; }
  .widget-block {
    border: 1px solid var(--line); border-radius: 8px;
    padding: 12px; margin-bottom: 10px; background: #fff;
  }
  .widget-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .widget-type { font-size: 12px; font-weight: 600; color: var(--brand); text-transform: uppercase; letter-spacing: .04em; }
  .icon-btn {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 16px; padding: 2px 6px; border-radius: 6px;
  }
  .icon-btn:hover { background: #f1f3f4; color: var(--warn); }
  .widget-add { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .chip {
    border: 1px dashed var(--line); background: #fff; border-radius: 20px;
    padding: 6px 12px; font-size: 12px; cursor: pointer; color: var(--muted);
  }
  .chip:hover { border-color: var(--brand); color: var(--brand); }

  .btn-row-item {
    display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 8px;
    align-items: center; margin-bottom: 6px;
  }
  .color-input { width: 42px; height: 38px; padding: 2px; border-radius: 8px; border: 1px solid var(--line); cursor: pointer; }

  /* ---------- JSON ---------- */
  .json-box {
    background: #202124; color: #e8eaed; border-radius: 8px;
    padding: 14px; font-size: 12px; line-height: 1.5;
    overflow: auto; max-height: 320px; margin: 0;
    font-family: "Roboto Mono", monospace; white-space: pre;
  }
  #jsonStatus.err { color: var(--warn); }
  #jsonStatus.ok { color: var(--ok); }

  .send-bar { position: sticky; bottom: 0; padding: 4px 0; }

  /* ---------- Preview (Google Chat look) ---------- */
  .preview-sticky { position: sticky; top: 90px; }
  .preview-pane h3 { font-size: 14px; color: var(--muted); margin: 0 0 12px; }
  .chat-window {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow);
  }
  .chat-bot { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bot-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--brand), #34a853); color: #fff;
    display: grid; place-items: center; font-size: 13px; font-weight: 700;
  }
  .bot-meta strong { font-size: 14px; }
  .bot-meta span { color: var(--muted); font-size: 12px; }
  .preview-text { font-size: 14px; margin: 0 0 10px; white-space: pre-wrap; word-break: break-word; }
  .preview-text:empty { display: none; }

  .gchat-card {
    border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
    max-width: 360px; background: #fff;
  }
  .gchat-card:empty { display: none; }
  .gc-header { display: flex; align-items: center; gap: 12px; padding: 14px; }
  .gc-header img { width: 44px; height: 44px; object-fit: cover; }
  .gc-header img.circle { border-radius: 50%; }
  .gc-header img.square { border-radius: 6px; }
  .gc-header .gc-title { font-size: 15px; font-weight: 500; }
  .gc-header .gc-subtitle { font-size: 12px; color: var(--muted); }
  .gc-section { padding: 6px 14px 14px; }
  .gc-section-header { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; margin: 8px 0; }
  .gc-text { font-size: 14px; line-height: 1.5; margin: 8px 0; word-break: break-word; }
  .gc-img { width: 100%; border-radius: 8px; margin: 8px 0; display: block; }
  .gc-divider { height: 1px; background: var(--line); margin: 12px 0; }
  .gc-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .gc-btn {
    border: 1px solid var(--line); border-radius: 18px; padding: 7px 16px;
    font-size: 13px; font-weight: 500; color: var(--brand); background: #fff;
    text-decoration: none; display: inline-block;
  }
  .gc-deco { margin: 8px 0; }
  .gc-deco .top { font-size: 11px; color: var(--muted); }
  .gc-deco .main { font-size: 14px; }
  .gc-deco .bottom { font-size: 11px; color: var(--muted); }
  .gc-empty { color: var(--muted); font-size: 13px; padding: 18px; text-align: center; }

  /* decoratedText preview */
  .gc-deco-row { display: flex; align-items: flex-start; gap: 10px; margin: 8px 0; }
  .gc-deco-icon { font-size: 20px; line-height: 1.3; }
  .gc-deco-body { flex: 1; }
  .gc-deco-body .top { font-size: 11px; color: var(--muted); }
  .gc-deco-body .main { font-size: 14px; }
  .gc-deco-body .bottom { font-size: 11px; color: var(--muted); }
  .gc-deco-btn { align-self: center; }

  /* chips preview */
  .gc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .gc-chip {
    display: inline-flex; align-items: center; gap: 5px;
    border: 1px solid var(--line); border-radius: 16px; padding: 5px 12px;
    font-size: 12px; color: var(--ink); background: #fff; text-decoration: none;
  }

  /* grid preview */
  .gc-grid { display: grid; gap: 8px; margin: 8px 0; }
  .gc-grid-item { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .gc-grid-item img { width: 100%; height: 80px; object-fit: cover; display: block; }
  .gc-grid-cap { padding: 6px 8px; }
  .gc-grid-cap .t { font-size: 12px; font-weight: 500; }
  .gc-grid-cap .s { font-size: 11px; color: var(--muted); }

  /* button types preview */
  .gc-btn.filled { background: var(--brand); color: #fff; border-color: var(--brand); }
  .gc-btn.tonal { background: #d2e3fc; color: var(--brand-dark); border-color: #d2e3fc; }
  .gc-btn.borderless { border-color: transparent; }
  .gc-btn .bi { margin-right: 4px; }

  /* ---------- Builder: reorder + collapsible ---------- */
  .row-tools { display: flex; align-items: center; gap: 2px; }
  .icon-btn.move { font-size: 13px; }
  .icon-btn.move:hover { background: #f1f3f4; color: var(--brand); }
  .section-options { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin: 4px 0 10px; }
  .mini { width: 64px !important; }
  .inline-field { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .inline-field input[type=number] { width: 56px; padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px; }

  .help {
    background: #e8f0fe; border: 1px solid #c6dafc; color: #1557b0;
    border-radius: 8px; padding: 10px 12px; font-size: 12px; margin-bottom: 14px;
    line-height: 1.5;
  }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  @media (max-width: 520px) { .grid-3 { grid-template-columns: 1fr; } }

  /* ---------- Modal ---------- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: grid; place-items: center; z-index: 50; padding: 20px;
  }
  /* El atributo hidden debe ganar sobre display:grid */
  .modal-overlay[hidden] { display: none; }
  .modal {
    background: #fff; border-radius: var(--radius); padding: 24px;
    max-width: 440px; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,.25);
  }
  .modal h3 { margin: 0 0 10px; }
  .modal p { color: var(--muted); margin: 8px 0; }
  .modal-target {
    background: #f1f3f4; border-radius: 8px; padding: 10px;
    font-family: monospace; font-size: 11px; word-break: break-all; margin: 10px 0;
  }
  .modal-warn { color: var(--warn) !important; font-size: 13px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #202124; color: #fff; padding: 12px 20px; border-radius: 8px;
    font-size: 14px; z-index: 60; box-shadow: 0 4px 14px rgba(0,0,0,.3);
    max-width: 90%;
  }
  .toast.ok { background: var(--ok); }
  .toast.err { background: var(--warn); }
  .toast[hidden] { display: none; }
</style>
